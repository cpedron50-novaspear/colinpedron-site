<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ page.title }} | Colin Pedron</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <meta property="og:title" content="{{ page.title }}" />
  <meta property="og:description" content="{{ page.description | default: site.description }}" />
  <meta property="og:type" content="article" />
  <meta property="og:url" content="{{ page.url | absolute_url }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #FAFAF8;
      --surface: #FFFFFF;
      --text: #1A1A1A;
      --text-secondary: #5C5C5C;
      --accent: #2D5A3D;
      --accent-light: #E8F0EB;
      --border: #E5E5E0;
      --border-light: #F0F0EC;
      --link: #2D5A3D;
      --link-hover: #1E3D29;
      --code-bg: #F5F5F0;
      --tag-bg: #F0EDE8;
      --tag-text: #6B5E4F;
      --max-content: 680px;
      --max-page: 1100px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 17px; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

    body {
      font-family: 'Newsreader', Georgia, serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.72;
    }

    a { color: inherit; text-decoration: none; }

    /* ── Nav ──────────────────────────────────────────── */
    .blog-nav {
      max-width: var(--max-page);
      margin: 0 auto;
      padding: 1.6rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .blog-nav-logo {
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 1.1rem;
      color: var(--text);
    }
    .blog-nav-logo span { color: var(--accent); }
    .blog-nav-links {
      display: flex;
      gap: 2rem;
      list-style: none;
    }
    .blog-nav-links a {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      transition: color 0.2s;
    }
    .blog-nav-links a:hover { color: var(--text); }

    /* ── Main content area ────────────────────────────── */
    .blog-content {
      max-width: var(--max-content);
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* ── Footer ──────────────────────────────────────── */
    .blog-footer {
      max-width: var(--max-page);
      margin: 0 auto;
      padding: 2.5rem 2rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .blog-footer-text {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      color: var(--text-secondary);
    }
    .blog-footer-links {
      display: flex;
      gap: 1.5rem;
      list-style: none;
    }
    .blog-footer-links a {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      color: var(--text-secondary);
    }
    .blog-footer-links a:hover { color: var(--text); }

    /* ── Blog index hero ─────────────────────────────── */
    .blog-hero {
      padding: 3.5rem 0 2rem;
    }
    .blog-hero-eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--accent);
      margin-bottom: 0.7rem;
    }
    .blog-hero h1 {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 2.4rem;
      font-weight: 600;
      line-height: 1.15;
      letter-spacing: -0.025em;
      color: var(--text);
      margin-bottom: 0.6rem;
    }
    .blog-hero-desc {
      font-size: 1.08rem;
      color: var(--text-secondary);
      line-height: 1.6;
      max-width: 50ch;
    }

    /* ── Blog card list ──────────────────────────────── */
    .blog-list {
      padding-bottom: 4rem;
    }
    .blog-card {
      display: block;
      padding: 1.4rem 0;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .blog-card:first-child {
      border-top: 1px solid var(--border);
    }
    .blog-card:hover {
      background: rgba(45,90,61,0.02);
    }
    .blog-card:hover .blog-card-arrow {
      opacity: 1;
      transform: translateX(3px);
    }
    .blog-card-inner {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }
    .blog-card-content { flex: 1; min-width: 0; }
    .blog-card-title {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      line-height: 1.3;
      margin: 0 0 0.35rem;
      color: var(--text);
    }
    .blog-card-meta {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.84rem;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .blog-card-meta time { font-weight: 500; }
    .blog-card-meta .dot { margin: 0 0.4rem; opacity: 0.4; }
    .blog-card-arrow {
      color: var(--accent);
      font-size: 1.1rem;
      opacity: 0;
      transition: opacity 0.15s, transform 0.15s;
      flex-shrink: 0;
      padding-top: 0.15rem;
    }
    .blog-card-tags {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-top: 0.5rem;
    }

    /* ── Tags ─────────────────────────────────────────── */
    .blog-tag {
      display: inline-block;
      font-family: 'DM Sans', sans-serif;
      padding: 0.15rem 0.6rem;
      border-radius: 4px;
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      color: var(--tag-text);
      background: var(--tag-bg);
    }

    /* ── Post page ───────────────────────────────────── */
    .post-wrapper {
      padding: 3.5rem 0 5rem;
    }
    .post-meta-top {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
      margin-bottom: 0.9rem;
    }
    .post-meta-top .blog-tag { text-transform: lowercase; }
    .post-date {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.82rem;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .post-title {
      font-family: 'Newsreader', Georgia, serif;
      font-size: 2.5rem;
      font-weight: 600;
      line-height: 1.16;
      letter-spacing: -0.025em;
      color: var(--text);
      margin-bottom: 0.7rem;
    }
    .post-desc {
      font-size: 1.15rem;
      color: var(--text-secondary);
      line-height: 1.6;
      font-style: italic;
      margin-bottom: 1.8rem;
      max-width: 55ch;
    }
    .post-rule {
      width: 40px;
      height: 2px;
      background: var(--accent);
      margin-bottom: 2.2rem;
    }

    /* ── Post body prose ─────────────────────────────── */
    .post-body {
      font-size: 1.04rem;
      line-height: 1.78;
    }
    .post-body p { margin-bottom: 1.4em; }
    .post-body h2 {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text);
      margin-top: 2.8rem;
      margin-bottom: 1rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    .post-body h3 {
      font-size: 1.2rem;
      font-weight: 600;
      margin-top: 2rem;
      margin-bottom: 0.7rem;
      letter-spacing: -0.01em;
    }
    .post-body ul, .post-body ol {
      margin: 1rem 0 1.6rem 1.3rem;
    }
    .post-body li {
      margin-bottom: 0.45rem;
      padding-left: 0.3rem;
    }
    .post-body li::marker { color: var(--accent); }
    .post-body a {
      color: var(--link);
      text-decoration: underline;
      text-decoration-color: rgba(45,90,61,0.3);
      text-underline-offset: 3px;
      transition: text-decoration-color 0.2s;
    }
    .post-body a:hover { text-decoration-color: var(--link-hover); }
    .post-body strong { font-weight: 600; }
    .post-body blockquote {
      border-left: 3px solid var(--accent);
      margin: 1.8rem 0;
      padding: 0.6rem 0 0.6rem 1.3rem;
      color: var(--text-secondary);
      font-style: italic;
    }
    .post-body code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background: var(--code-bg);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
    }

    /* ── Post footer ─────────────────────────────────── */
    .post-back {
      margin-top: 2.8rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }
    .post-back a {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.01em;
    }
    .post-back a:hover { color: var(--link-hover); }

    /* ── Reading list callout ────────────────────────── */
    .reading-list {
      background: var(--code-bg);
      border-radius: 6px;
      padding: 1.2rem 1.4rem;
      margin: 1.8rem 0;
    }
    .reading-list-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      margin-bottom: 0.6rem;
    }
    .reading-list ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .reading-list li {
      padding: 0.4rem 0;
      border-bottom: 1px solid var(--border-light);
      font-size: 0.94rem;
      margin-bottom: 0;
      padding-left: 0;
    }
    .reading-list li:last-child { border-bottom: none; }
    .reading-list .author {
      color: var(--text-secondary);
      font-style: italic;
    }

    /* ── Mobile ──────────────────────────────────────── */
    @media (max-width: 640px) {
      html { font-size: 16px; }
      .blog-nav { padding: 1.2rem 1.25rem; }
      .blog-nav-links { gap: 1.2rem; }
      .blog-nav-links a { font-size: 0.76rem; }
      .blog-content { padding: 0 1.25rem; }
      .blog-hero { padding: 2.5rem 0 1.5rem; }
      .blog-hero h1 { font-size: 1.85rem; }
      .post-wrapper { padding: 2.5rem 0 4rem; }
      .post-title { font-size: 1.85rem; }
      .post-body { font-size: 1rem; }
      .blog-card-arrow { display: none; }
      .blog-footer {
        flex-direction: column;
        gap: 1rem;
        text-align: center;
        padding: 2rem 1.25rem;
      }
    }
  </style>
</head>
<body>

  <nav class="blog-nav">
    <a href="{{ '/' | relative_url }}" class="blog-nav-logo">Colin <span>Pedron</span></a>
    <ul class="blog-nav-links">
      <li><a href="{{ '/blog/' | relative_url }}">Blog</a></li>
      <li><a href="{{ '/' | relative_url }}">Home</a></li>
    </ul>
  </nav>

  <main class="blog-content">
    {{ content }}
  </main>

  <footer class="blog-footer">
    <span class="blog-footer-text">&copy; {{ "now" | date: "%Y" }} Colin Pedron</span>
    <ul class="blog-footer-links">
      <li><a href="{{ '/' | relative_url }}">Home</a></li>
      <li><a href="{{ '/blog/' | relative_url }}">Blog</a></li>
    </ul>
  </footer>

</body>
</html>
