---
layout: blog
---

<article class="post-wrapper">
  <header>
    <div class="post-meta-top">
      {% if page.tags %}
        {% for tag in page.tags %}
          <span class="blog-tag">{{ tag }}</span>
        {% endfor %}
      {% endif %}
      <time class="post-date">{{ page.date | date: "%b %-d, %Y" }}</time>
    </div>
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.description %}
      <p class="post-desc">{{ page.description }}</p>
    {% endif %}
    <div class="post-rule"></div>
  </header>

  <section class="post-body">
    {{ content }}
  </section>

  <div class="post-back">
    <a href="{{ '/blog/' | relative_url }}">&larr; All posts</a>
  </div>
</article>
