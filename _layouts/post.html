<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} | {{ site.title }}</title>
  <meta name="description" content="{{ page.subtitle | default: page.excerpt | strip_html | truncatewords: 30 }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=Newsreader:ital,opsz,wght@0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="site-title">{{ site.title }}</a>
    </div>
  </header>

  <main class="container">
    <article class="post">
      <header class="post-header">
        <time class="post-date" datetime="{{ page.date | date: '%Y-%m-%d' }}">{{ page.date | date: "%B %-d, %Y" }}</time>
        {% if page.tags.size > 0 %}
        <div class="post-tags">
          {% for tag in page.tags %}
          <span class="tag">{{ tag }}</span>
          {% endfor %}
        </div>
        {% endif %}
        <h1 class="post-title">{{ page.title }}</h1>
        {% if page.subtitle %}
        <p class="post-subtitle">{{ page.subtitle }}</p>
        {% endif %}
      </header>

      <div class="post-body">
        {{ content }}
      </div>

      <footer class="post-footer">
        <a href="/" class="back-link">&larr; All posts</a>
      </footer>
    </article>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; {{ site.time | date: '%Y' }} Colin Pedron</p>
    </div>
  </footer>
</body>
</html>
